<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopSphere — Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14161c;
    --surface:#1c1f28;
    --surface-2:#242833;
    --line:#2e3340;
    --text:#e6e8ee;
    --muted:#8c93a3;
    --accent:#5eead4;
    --accent-2:#f5a623;
    --danger:#f87171;
    --mono:'JetBrains Mono', monospace;
    --disp:'Space Grotesk', sans-serif;
    --body:'Inter', sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--body);
    min-height:100vh;
    padding-bottom:40px;
  }

  /* Header */
  header{
    background:var(--surface-2);
    border-bottom:1px solid var(--line);
    padding:16px 18px;
    position:sticky; top:0; z-index:10;
  }
  .header-row{
    max-width:1100px; margin:0 auto;
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .logo{font-family:var(--disp); font-size:20px; font-weight:700;}
  .logo span{color:var(--accent);}
  .cart-btn{
    background:var(--surface);
    border:1px solid var(--line);
    color:var(--text);
    border-radius:8px;
    padding:9px 14px;
    font-family:var(--mono);
    font-size:13px;
    cursor:pointer;
    display:flex; align-items:center; gap:8px;
  }
  .cart-count{
    background:var(--accent); color:#0b1210;
    border-radius:50%; width:20px; height:20px;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700;
  }

  .search-row{
    max-width:1100px; margin:14px auto 0;
    display:flex; gap:10px; flex-wrap:wrap;
  }
  input[type="text"]{
    flex:1; min-width:160px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:6px;
    padding:10px 14px;
    color:var(--text);
    font-family:var(--body);
    font-size:14px;
  }
  input:focus{outline:2px solid var(--accent); border-color:var(--accent);}
  select{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:6px;
    padding:10px 12px;
    color:var(--text);
    font-family:var(--mono);
    font-size:12.5px;
  }

  /* Category chips */
  .chips{
    max-width:1100px; margin:14px auto 0;
    display:flex; gap:8px; overflow-x:auto; padding-bottom:4px;
  }
  .chip{
    font-family:var(--mono); font-size:12px;
    padding:7px 14px; border-radius:20px;
    border:1px solid var(--line);
    background:var(--surface);
    color:var(--muted);
    white-space:nowrap;
    cursor:pointer;
  }
  .chip.active{background:var(--accent); color:#0b1210; border-color:var(--accent); font-weight:600;}

  /* Product grid */
  .grid{
    max-width:1100px; margin:20px auto 0;
    padding:0 18px;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));
    gap:14px;
  }
  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
    display:flex; flex-direction:column;
  }
  .card img{width:100%; aspect-ratio:1; object-fit:cover; background:var(--surface-2);}
  .card-thumb{
    width:100%; aspect-ratio:1;
    display:flex; align-items:center; justify-content:center;
    font-size:44px;
  }
  .card-body{padding:12px; display:flex; flex-direction:column; gap:6px; flex:1;}
  .card-cat{font-family:var(--mono); font-size:10px; color:var(--accent-2); text-transform:uppercase; letter-spacing:0.05em;}
  .card-name{font-family:var(--disp); font-size:14.5px; line-height:1.3;}
  .card-price{font-family:var(--mono); font-size:15px; color:var(--accent); font-weight:600; margin-top:auto;}
  .card-add{
    margin-top:8px;
    background:var(--accent); color:#0b1210; border:none;
    border-radius:6px; padding:9px; font-family:var(--mono);
    font-size:12.5px; font-weight:600; cursor:pointer;
  }
  .card-add:active{transform:scale(0.97);}
  .no-results{
    grid-column:1/-1; text-align:center; padding:40px 0;
    font-family:var(--mono); color:var(--muted); font-size:13px;
  }

  /* Cart drawer */
  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.5);
    display:none; z-index:20;
  }
  .overlay.show{display:block;}
  .drawer{
    position:fixed; top:0; right:0; height:100%;
    width:min(380px, 90vw);
    background:var(--surface);
    border-left:1px solid var(--line);
    transform:translateX(100%);
    transition:transform 0.25s ease;
    z-index:21;
    display:flex; flex-direction:column;
  }
  .drawer.show{transform:translateX(0);}
  .drawer-head{
    padding:16px 18px;
    border-bottom:1px solid var(--line);
    display:flex; justify-content:space-between; align-items:center;
  }
  .drawer-head h2{font-family:var(--disp); font-size:17px;}
  .close-btn{background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer;}
  .drawer-items{flex:1; overflow-y:auto; padding:14px 18px;}
  .cart-item{
    display:flex; gap:10px; padding:10px 0;
    border-bottom:1px solid var(--line);
  }
  .cart-item img{width:52px; height:52px; border-radius:6px; object-fit:cover;}
  .ci-thumb{
    width:52px; height:52px; border-radius:6px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:22px;
  }
  .ci-info{flex:1;}
  .ci-name{font-size:13.5px; margin-bottom:4px;}
  .ci-price{font-family:var(--mono); font-size:12px; color:var(--accent);}
  .ci-qty{display:flex; align-items:center; gap:8px; margin-top:6px;}
  .qty-btn{
    background:var(--surface-2); border:1px solid var(--line); color:var(--text);
    width:22px; height:22px; border-radius:4px; font-family:var(--mono);
    cursor:pointer; font-size:13px;
  }
  .ci-remove{background:none; border:none; color:var(--danger); font-family:var(--mono); font-size:11px; cursor:pointer;}
  .empty-cart{font-family:var(--mono); color:var(--muted); font-size:13px; text-align:center; padding:40px 0;}

  .drawer-footer{
    padding:16px 18px;
    border-top:1px solid var(--line);
  }
  .total-row{
    display:flex; justify-content:space-between;
    font-family:var(--mono); font-size:14px; margin-bottom:12px;
  }
  .total-row b{color:var(--accent); font-size:17px;}
  .checkout-btn{
    width:100%; background:var(--accent); color:#0b1210; border:none;
    border-radius:6px; padding:13px; font-family:var(--mono);
    font-weight:600; font-size:14px; cursor:pointer;
  }
  .checkout-btn:disabled{opacity:0.4; cursor:not-allowed;}

  /* Confirmation modal */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.6);
    display:none; align-items:center; justify-content:center; z-index:30; padding:20px;
  }
  .modal-overlay.show{display:flex;}
  .modal{
    background:var(--surface); border:1px solid var(--line);
    border-radius:10px; padding:28px 24px; max-width:340px; text-align:center;
  }
  .modal .check-icon{
    width:52px; height:52px; border-radius:50%; background:var(--accent);
    color:#0b1210; display:flex; align-items:center; justify-content:center;
    font-size:26px; margin:0 auto 14px;
  }
  .modal h3{font-family:var(--disp); font-size:19px; margin-bottom:8px;}
  .modal p{color:var(--muted); font-size:13.5px; margin-bottom:18px;}
  .modal button{
    background:var(--accent); color:#0b1210; border:none;
    border-radius:6px; padding:10px 22px; font-family:var(--mono);
    font-weight:600; cursor:pointer;
  }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="logo">Shop<span>Sphere</span></div>
    <button class="cart-btn" onclick="openCart()">
      🛒 Cart <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
  <div class="search-row">
    <input type="text" id="searchInput" placeholder="Search products..." oninput="renderProducts()" />
    <select id="sortSelect" onchange="renderProducts()">
      <option value="default">Sort: Default</option>
      <option value="low">Price: Low to High</option>
      <option value="high">Price: High to Low</option>
    </select>
  </div>
  <div class="chips" id="chips"></div>
</header>

<div class="grid" id="grid"></div>

<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <h2>Your Cart</h2>
    <button class="close-btn" onclick="closeCart()">✕</button>
  </div>
  <div class="drawer-items" id="drawerItems"></div>
  <div class="drawer-footer">
    <div class="total-row">Total <b id="cartTotal">₹0</b></div>
    <button class="checkout-btn" id="checkoutBtn" onclick="checkout()">Checkout</button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="check-icon">✓</div>
    <h3>Order Placed!</h3>
    <p>Your order has been confirmed. This is a demo checkout — no real payment was made.</p>
    <button onclick="closeModal()">Continue Shopping</button>
  </div>
</div>

<script>
  const products = [
    { id:1, name:"Wireless Earbuds Pro", price:1899, category:"Electronics", emoji:"🎧", color:"#2b3a55" },
    { id:2, name:"Minimalist Watch", price:2499, category:"Accessories", emoji:"⌚", color:"#3a2b40" },
    { id:3, name:"Canvas Backpack", price:1299, category:"Bags", emoji:"🎒", color:"#2b4030" },
    { id:4, name:"Ceramic Coffee Mug", price:399, category:"Home", emoji:"☕", color:"#40342b" },
    { id:5, name:"Running Sneakers", price:2999, category:"Footwear", emoji:"👟", color:"#2b3d40" },
    { id:6, name:"Bluetooth Speaker", price:1599, category:"Electronics", emoji:"🔊", color:"#2b3a55" },
    { id:7, name:"Leather Wallet", price:899, category:"Accessories", emoji:"👛", color:"#3a2b40" },
    { id:8, name:"Desk Lamp", price:749, category:"Home", emoji:"💡", color:"#40342b" },
    { id:9, name:"Yoga Mat", price:599, category:"Fitness", emoji:"🧘", color:"#2b4038" },
    { id:10, name:"Sunglasses", price:1099, category:"Accessories", emoji:"🕶️", color:"#3a2b40" },
    { id:11, name:"Travel Duffel Bag", price:1799, category:"Bags", emoji:"🧳", color:"#2b4030" },
    { id:12, name:"Smart Fitness Band", price:2199, category:"Electronics", emoji:"⌚", color:"#2b3a55" },
    { id:13, name:"Denim Jacket", price:1999, category:"Clothing", emoji:"🧥", color:"#2b3550" },
    { id:14, name:"Graphic T-Shirt", price:599, category:"Clothing", emoji:"👕", color:"#2b3550" },
    { id:15, name:"Table Plant Pot", price:449, category:"Home", emoji:"🪴", color:"#2b4030" },
    { id:16, name:"Wireless Mouse", price:799, category:"Electronics", emoji:"🖱️", color:"#2b3a55" },
    { id:17, name:"Skincare Set", price:1299, category:"Beauty", emoji:"🧴", color:"#40342b" },
    { id:18, name:"Dumbbell Set", price:1499, category:"Fitness", emoji:"🏋️", color:"#2b4038" },
    { id:19, name:"Baseball Cap", price:499, category:"Accessories", emoji:"🧢", color:"#3a2b40" },
    { id:20, name:"Notebook Set", price:349, category:"Stationery", emoji:"📓", color:"#40342b" },
    { id:21, name:"Umbrella", price:649, category:"Accessories", emoji:"☂️", color:"#3a2b40" },
    { id:22, name:"Formal Shoes", price:2799, category:"Footwear", emoji:"👞", color:"#2b3d40" }
  ];

  let cart = [];
  let activeCategory = 'All';

  const categories = ['All', ...new Set(products.map(p => p.category))];

  function renderChips(){
    const chips = document.getElementById('chips');
    chips.innerHTML = categories.map(cat =>
      `<div class="chip ${cat === activeCategory ? 'active' : ''}" onclick="selectCategory('${cat}')">${cat}</div>`
    ).join('');
  }

  function selectCategory(cat){
    activeCategory = cat;
    renderChips();
    renderProducts();
  }

  function renderProducts(){
    const search = document.getElementById('searchInput').value.toLowerCase();
    const sort = document.getElementById('sortSelect').value;

    let filtered = products.filter(p =>
      (activeCategory === 'All' || p.category === activeCategory) &&
      p.name.toLowerCase().includes(search)
    );

    if(sort === 'low') filtered.sort((a,b) => a.price - b.price);
    if(sort === 'high') filtered.sort((a,b) => b.price - a.price);

    const grid = document.getElementById('grid');
    if(filtered.length === 0){
      grid.innerHTML = '<div class="no-results">No products found.</div>';
      return;
    }

    grid.innerHTML = filtered.map(p => `
      <div class="card">
        <div class="card-thumb" style="background:${p.color}">${p.emoji}</div>
        <div class="card-body">
          <div class="card-cat">${p.category}</div>
          <div class="card-name">${p.name}</div>
          <div class="card-price">₹${p.price.toLocaleString('en-IN')}</div>
          <button class="card-add" onclick="addToCart(${p.id})">Add to Cart</button>
        </div>
      </div>
    `).join('');
  }

  function addToCart(id){
    const product = products.find(p => p.id === id);
    const existing = cart.find(item => item.id === id);
    if(existing){
      existing.qty += 1;
    } else {
      cart.push({ ...product, qty: 1 });
    }
    updateCartUI();
  }

  function changeQty(id, delta){
    const item = cart.find(i => i.id === id);
    if(!item) return;
    item.qty += delta;
    if(item.qty <= 0){
      cart = cart.filter(i => i.id !== id);
    }
    updateCartUI();
  }

  function removeItem(id){
    cart = cart.filter(i => i.id !== id);
    updateCartUI();
  }

  function updateCartUI(){
    const count = cart.reduce((sum, i) => sum + i.qty, 0);
    document.getElementById('cartCount').textContent = count;

    const drawerItems = document.getElementById('drawerItems');
    if(cart.length === 0){
      drawerItems.innerHTML = '<div class="empty-cart">Your cart is empty.</div>';
    } else {
      drawerItems.innerHTML = cart.map(item => `
        <div class="cart-item">
          <div class="ci-thumb" style="background:${item.color}">${item.emoji}</div>
          <div class="ci-info">
            <div class="ci-name">${item.name}</div>
            <div class="ci-price">₹${(item.price * item.qty).toLocaleString('en-IN')}</div>
            <div class="ci-qty">
              <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
              <span>${item.qty}</span>
              <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
              <button class="ci-remove" onclick="removeItem(${item.id})">remove</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    const total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);
    document.getElementById('cartTotal').textContent = '₹' + total.toLocaleString('en-IN');
    document.getElementById('checkoutBtn').disabled = cart.length === 0;
  }

  function openCart(){
    document.getElementById('drawer').classList.add('show');
    document.getElementById('overlay').classList.add('show');
  }
  function closeCart(){
    document.getElementById('drawer').classList.remove('show');
    document.getElementById('overlay').classList.remove('show');
  }

  function checkout(){
    if(cart.length === 0) return;
    document.getElementById('modalOverlay').classList.add('show');
    cart = [];
    updateCartUI();
    closeCart();
  }
  function closeModal(){
    document.getElementById('modalOverlay').classList.remove('show');
  }

  renderChips();
  renderProducts();
  updateCartUI();
</script>

</body>
</html>
